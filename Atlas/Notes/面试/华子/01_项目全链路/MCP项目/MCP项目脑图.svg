<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f472b6"/>
    </marker>
    <style>
      .title { font: 700 38px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #cbd5e1; }
      .card-title { font: 700 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #f8fafc; }
      .card-text { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #e2e8f0; }
      .mini { font: 600 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #f8fafc; }
      .line-green { stroke: #34d399; stroke-width: 4; fill: none; marker-end: url(#arrowGreen); opacity: 0.9; }
      .line-blue { stroke: #60a5fa; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); opacity: 0.9; }
      .line-pink { stroke: #f472b6; stroke-width: 4; fill: none; marker-end: url(#arrowPink); opacity: 0.9; }
      .chip { font: 600 13px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #dbeafe; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="80" y="90" class="title">MCP Agent Studio 项目脑图</text>
  <text x="80" y="125" class="subtitle">面试口述版：先讲结构，再讲主链路，最后讲 Worktree 位置</text>

  <path d="M800 450 C650 330, 470 260, 320 240" class="line-green"/>
  <path d="M800 450 C600 420, 420 430, 280 470" class="line-blue"/>
  <path d="M800 450 C650 540, 490 630, 330 710" class="line-pink"/>
  <path d="M800 450 C940 320, 1080 250, 1270 240" class="line-green"/>
  <path d="M800 450 C980 420, 1130 430, 1320 470" class="line-blue"/>
  <path d="M800 450 C920 560, 1070 640, 1260 730" class="line-pink"/>

  <g filter="url(#shadow)">
    <rect x="600" y="330" rx="30" ry="30" width="400" height="240" fill="#0b3b66" stroke="#93c5fd" stroke-width="3"/>
    <text x="800" y="382" text-anchor="middle" class="card-title">MCP Agent Studio 项目</text>
    <text x="800" y="420" text-anchor="middle" class="card-text">前端演示台 + 本地 MCP Server + Tool Router + 多 Agent 概念层</text>
    <text x="800" y="455" text-anchor="middle" class="card-text">重点是复杂代码任务的规划、调度、执行与结果回传</text>
    <rect x="655" y="485" rx="18" ry="18" width="125" height="38" fill="#1d4ed8"/>
    <rect x="792" y="485" rx="18" ry="18" width="125" height="38" fill="#047857"/>
    <text x="717" y="510" text-anchor="middle" class="chip">MCP / ReAct</text>
    <text x="855" y="510" text-anchor="middle" class="chip">Worktree</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="120" rx="24" ry="24" width="350" height="210" fill="#14532d" stroke="#6ee7b7" stroke-width="3"/>
    <text x="150" y="165" class="card-title">1. 前端层 Vue</text>
    <text x="150" y="205" class="card-text">• 页面入口：/mcp-studio</text>
    <text x="150" y="236" class="card-text">• 输入 prompt、点生成规划、点开始运行</text>
    <text x="150" y="267" class="card-text">• 展示 Agent 状态、时间线、结果</text>
    <text x="150" y="298" class="card-text">• 关键文件：src/views/dashboard/index.vue</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="380" rx="24" ry="24" width="400" height="190" fill="#1e3a8a" stroke="#93c5fd" stroke-width="3"/>
    <text x="120" y="425" class="card-title">2. MCP Server 总控层</text>
    <text x="120" y="465" class="card-text">• 接收前端请求，做参数校验</text>
    <text x="120" y="496" class="card-text">• 负责 /bootstrap /plan /run /stream</text>
    <text x="120" y="527" class="card-text">• 像一个 orchestrator，把整个链路串起来</text>
    <text x="120" y="558" class="card-text">• 关键文件：server/mcp-server.mjs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="620" rx="24" ry="24" width="380" height="210" fill="#9d174d" stroke="#f9a8d4" stroke-width="3"/>
    <text x="140" y="665" class="card-title">3. ReAct / 规划层</text>
    <text x="140" y="705" class="card-text">• Think：按 prompt + scenario 先规划</text>
    <text x="140" y="736" class="card-text">• Act：交给 Tool Router 选工具执行</text>
    <text x="140" y="767" class="card-text">• Observe：收集 output / evidence / result</text>
    <text x="140" y="798" class="card-text">• 本质是轻量执行范式，不是正式 LangGraph</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1130" y="120" rx="24" ry="24" width="350" height="220" fill="#14532d" stroke="#6ee7b7" stroke-width="3"/>
    <text x="1160" y="165" class="card-title">4. 场景与 Agent 配置</text>
    <text x="1160" y="205" class="card-text">• scenarios：coding / rag / ops</text>
    <text x="1160" y="236" class="card-text">• agents：Planner / Retriever / Executor / Guardrail</text>
    <text x="1160" y="267" class="card-text">• 主要给前端展示，也参与规划逻辑</text>
    <text x="1160" y="298" class="card-text">• 关键文件：server/mcp-data.mjs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="390" rx="24" ry="24" width="420" height="210" fill="#7c2d12" stroke="#fdba74" stroke-width="3"/>
    <text x="1110" y="435" class="card-title">5. Tool Router / 工具层</text>
    <text x="1110" y="475" class="card-text">• 注册工具、校验参数、调用 handler</text>
    <text x="1110" y="506" class="card-text">• 当前工具：search-docs / graph-query / codebase / shell</text>
    <text x="1110" y="537" class="card-text">• 本质是执行总线，不是模型本体</text>
    <text x="1110" y="568" class="card-text">• 关键文件：server/tool-registry.mjs、server/tools/</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="650" rx="24" ry="24" width="420" height="210" fill="#7e22ce" stroke="#d8b4fe" stroke-width="3"/>
    <text x="1110" y="695" class="card-title">6. Executor / Git Worktree</text>
    <text x="1110" y="735" class="card-text">• 真正执行动作的那一层</text>
    <text x="1110" y="766" class="card-text">• isolateWorkspace 是关键 flag</text>
    <text x="1110" y="797" class="card-text">• 目标：隔离改动，避免多任务相互污染</text>
    <text x="1110" y="828" class="card-text">• 当前更偏演示设计，但位置很关键</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="760" rx="22" ry="22" width="560" height="140" fill="#0f766e" stroke="#99f6e4" stroke-width="3"/>
    <text x="800" y="802" text-anchor="middle" class="card-title">今日主链路</text>
    <text x="800" y="842" text-anchor="middle" class="card-text">打开 /mcp-studio → Frontend 请求 /bootstrap → 用户输入复杂指令 → /plan 生成计划</text>
    <text x="800" y="872" text-anchor="middle" class="card-text">/run 按计划调工具 → Executor 执行动作 → SSE 推送状态 → 前端展示最终结果</text>
  </g>
</svg>
